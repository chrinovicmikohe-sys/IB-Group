<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Building Group — Gestion</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="css/gestion.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="gestion-body">
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <img src="../Photos/logo.jpg" alt="Imperial Building Group" onerror="this.style.display='none'" />
          <h1>Imperial Building Group</h1>
          <p>Portail de gestion</p>
        </div>
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="login-email"><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="login-email" placeholder="exemple@imperialbuilding.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password"><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="login-error"></div>
          <button type="submit" class="btn btn-primary login-btn">Se connecter</button>
        </form>
        <p class="login-hint">Comptes de démo disponibles</p>
      </div>
    </div>

    <!-- Main Application -->
    <div id="main-app" class="main-app" style="display:none;">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <img src="../Photos/logo.jpg" alt="IBG" onerror="this.style.display='none'" />
            <span>IBG Gestion</span>
          </div>
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <div class="sidebar-user" id="sidebar-user">
          <div class="sidebar-user-avatar" id="user-avatar">A</div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="user-name">Admin</span>
            <span class="sidebar-user-role" id="user-role">Administrateur</span>
          </div>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
          <a href="#dashboard" class="nav-item active" data-route="dashboard">
            <i class="fas fa-th-large"></i>
            <span>Tableau de bord</span>
          </a>
          <a href="#projects" class="nav-item" data-route="projects">
            <i class="fas fa-building"></i>
            <span>Projets</span>
          </a>
          <a href="#employees" class="nav-item" data-route="employees">
            <i class="fas fa-users"></i>
            <span>Employés</span>
          </a>
          <a href="#clients" class="nav-item" data-route="clients">
            <i class="fas fa-handshake"></i>
            <span>Clients</span>
          </a>
          <a href="#reports" class="nav-item" data-route="reports">
            <i class="fas fa-chart-bar"></i>
            <span>Rapports</span>
          </a>
          <a href="#messages" class="nav-item" data-route="messages">
            <i class="fas fa-comments"></i>
            <span>Messages</span>
            <span class="badge badge-notif" id="msg-notif-badge" style="display:none;">0</span>
          </a>
          <a href="#calendar" class="nav-item" data-route="calendar">
            <i class="fas fa-calendar-alt"></i>
            <span>Calendrier</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <button class="nav-item" id="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Déconnexion</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <header class="content-header">
          <div class="content-header-left">
            <h2 id="page-title">Tableau de bord</h2>
            <p id="page-subtitle" class="page-subtitle">Vue d'ensemble de l'activité</p>
          </div>
          <div class="content-header-right">
            <button class="btn-icon" id="notif-btn" aria-label="Notifications">
              <i class="fas fa-bell"></i>
              <span class="badge badge-notif" id="notif-badge" style="display:none;">0</span>
            </button>
            <div class="theme-switch-mini" id="theme-switch-mini" title="Mode sombre/clair">
              <i class="fas fa-moon"></i>
            </div>
          </div>
        </header>

        <div class="content-body" id="content-body">
          <!-- Pages will be dynamically loaded here -->
        </div>
      </main>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notif-panel" style="display:none;">
      <div class="notif-panel-header">
        <h3>Notifications</h3>
        <button id="notif-close" class="btn-icon"><i class="fas fa-times"></i></button>
      </div>
      <div class="notif-panel-body" id="notif-panel-body">
        <p class="notif-empty">Aucune notification</p>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" style="display:none;"></div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
