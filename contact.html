  <main>
    <section class="section contact" id="contact-section">
      <div id="snowflakes-container"></div>
      <div class="container contact-card">
        <h1 data-i18n="contact_title">Contact</h1>
        <p data-i18n="contact_text">Envoyez un message pour discuter de votre projet.</p>
        <p class="contact-email">Email: <a href="mailto:imperialbuilding20@gmail.com">imperialbuilding20@gmail.com</a></p>
        <p class="contact-email">Tél: <a href="tel:+243978172514">+243 978 172 514</a></p>
        <form id="contact-form">
          <label>
            <span data-i18n="label_name">Nom</span>
            <input type="text" name="name" data-i18n-placeholder="placeholder_name" placeholder="Votre nom" required pattern=".{2,}" title="Au moins 2 caractères" />
          </label>
          <label>
            <span data-i18n="label_email">Email</span>
            <input type="email" name="email" data-i18n-placeholder="placeholder_email" placeholder="Votre email" required />
          </label>
          <label>
            <span data-i18n="label_subject">Sujet</span>
            <select name="subject" data-i18n="contact_subject_options">
              <option value="Devis" data-i18n="contact_subject_quote">Demande de devis</option>
              <option value="Information" data-i18n="contact_subject_info">Demande d'information</option>
              <option value="Projet" data-i18n="contact_subject_project">Projet de construction</option>
              <option value="Renovation" data-i18n="contact_subject_renovation">Projet de rénovation</option>
              <option value="Formation" data-i18n="contact_subject_training">Formation</option>
              <option value="Autre" data-i18n="contact_subject_other">Autre</option>
            </select>
          </label>
          <label>
            <span data-i18n="label_message">Message</span>
            <textarea name="message" rows="5" data-i18n-placeholder="placeholder_message" placeholder="Votre message" required minlength="10"></textarea>
          </label>
          <button type="submit" class="btn btn-primary" data-i18n="contact_send">Envoyer</button>
          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
